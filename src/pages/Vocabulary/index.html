<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的词汇量</title>

  <link rel="shortcut icon" href="/src/assets/logo.jpg" type="image/x-icon">
  <link rel="bookmark" href="/src/assets/logo.jpg">
  <link rel="stylesheet" href="/node_modules/fleetjs/dist/css/fleet.css">
  <link rel="stylesheet" href="./css/index.css">

</head>

<body>

  <div class="main">

    <!-- main-head -->
    <div class="main-head" data-tabs="HeadTab">
      <a 
        class="tab-item active" 
        data-tab="review" 
        href="#review" 
        accesskey="v"
      >复习</a>
      <a 
        class="tab-item" 
        data-tab="record" 
        href="#record" 
        accesskey="c"
        >记录</a>
    </div>

    <!-- main-body -->
    <div class="main-body">

      <!-- review -->
      <div 
        class="body-detail review-content active" 
        data-filter="review" 
        data-fleet="review"
      >
        <div class="review-head">
          <select name="model" @change="changeModel">
            <option value="0">默认模式</option>
            <option value="1">单词模式</option>
            <option value="2">解释模式</option>
          </select>
        </div>
        <div class="review-body" @click="nextShow">这里空空如也</div>
        <div class="review-foot">
          <input 
            type="text" 
            name="input" 
            accesskey="q"
            @keyup="checkInput"
          >
        </div>
      </div>

      <!-- recird -->
      <div class="body-detail" data-filter="record">

        <div class="record-form" data-fleet="RecordForm">
          <form>
            <input type="text" placeholder="单词" $="word" accesskey="w">
            <input type="text" placeholder="解释" $="exp" accesskey="s">
            <button 
              type="submit" 
              class="record-btn primary" 
              @click="addWord"
            >记录</button>
          </form>
        </div>

        <ul class="word-list" data-fleet="WordList" hidden>
          <li class="word-item">
            <div class="word-item-dot"></div>
            <div class="word-item-wrapper">
              <div class="word-item-title">
                <a 
                  href 
                  class="title-text" 
                  @click="addWorldToReviewList"
                >2022-7-19</a>
              </div>
              <div class="word-item-content" @click="showWordExp">
                <a href class="word"></a>
              </div>
            </div>
          </li>
        </ul>

        <div class="word-list-pagin" data-pagination="WordListPagin">
          <button data-prev>上一页</button>
          <ul data-pager></ul>
          <button data-next>下一页</button>
        </div>
      </div>
    </div>
  </div>

  <!-- JavaScript -->
  <script src="/node_modules/fleetjs/dist/fleet.js"></script>
  <script src="./js/index.js" type="module"></script>

</body>

</html>
